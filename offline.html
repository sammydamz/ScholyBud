<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Offline - ScholyBud</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      padding: 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .icon {
      font-size: 64px;
      margin-bottom: 24px;
    }

    h1 {
      color: #1a202c;
      font-size: 28px;
      margin-bottom: 16px;
      font-weight: 700;
    }

    p {
      color: #4a5568;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .button {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-block;
    }

    .button:hover {
      background: #4338ca;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
    }

    .button:active {
      transform: translateY(0);
    }

    .info {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #e2e8f0;
      font-size: 14px;
      color: #718096;
    }

    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      background: #fed7d7;
      color: #c53030;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .checking {
      animation: pulse 2s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <div class="status checking">No Internet Connection</div>
    <p>
      It looks like you've lost your internet connection. Don't worry - you can still access cached content.
      Please check your connection and try again.
    </p>
    <button class="button" onclick="window.location.reload()">
      Try Again
    </button>
    <div class="info">
      <strong>ScholyBud</strong> works best with an internet connection, but some features may still be available offline.
    </div>
  </div>

  <script>
    // Listen for connection changes
    window.addEventListener('online', () => {
      document.querySelector('.status').textContent = 'Connection Restored!';
      document.querySelector('.status').style.background = '#c6f6d5';
      document.querySelector('.status').style.color = '#22543d';
      document.querySelector('.status').classList.remove('checking');

      setTimeout(() => {
        window.location.reload();
      }, 1500);
    });

    window.addEventListener('offline', () => {
      document.querySelector('.status').textContent = 'Still Offline';
    });

    // Initial check
    if (navigator.onLine) {
      window.location.reload();
    }
  </script>
</body>
</html>
